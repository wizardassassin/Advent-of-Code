name: Run Solutions

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  SECRET_KEY: ${{ secrets.SECRET_KEY }}

jobs:
  run-javascript:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
      - name: Install Dependencies
        run: npm ci
      - name: Run Code
        run: node . run --remove-output
      - name: Validate Code
        run: node . validate --remove-output
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          path: data.enc.json
